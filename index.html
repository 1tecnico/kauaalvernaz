<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Escolar</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
color:white;

background:
linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
url("https://images6.alphacoders.com/303/303200.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

header{
background:linear-gradient(90deg,#ff6a00,#ff0000);
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(30,30,30,0.9);
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(255,90,0,0.5);
}

input,button,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
}

button{
background:#ff6a00;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff3c00;
}

.materia{
background:#333;
padding:8px;
margin-top:10px;
border-radius:5px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.materia span{
flex:1;
}

.apagar{
background:red;
border:none;
width:25px;
height:25px;
border-radius:4px;
color:white;
cursor:pointer;
font-size:12px;
display:flex;
align-items:center;
justify-content:center;
}

.apagar:hover{
background:#ff0000;
}

#caderno{
display:none;
}

</style>
</head>

<body>

<header>
🎒 Mochila Escolar
</header>

<div class="container">

<div class="card">

<h2>Matérias da Mochila</h2>

<input id="materiaInput" placeholder="Adicionar nova matéria">

<button onclick="addMateria()">Adicionar</button>

<div id="listaMaterias"></div>

</div>

<div class="card" id="caderno">

<h2 id="tituloMateria">Caderno</h2>

<textarea id="anotacao" rows="10" placeholder="Escreva aqui o que você estudou..."></textarea>

<button onclick="salvarAnotacao()">Salvar Anotação</button>

</div>

</div>

<script>

let materiaAtual = null

/* matérias padrão */
let materiasPadrao = [
"História",
"Matemática",
"Português",
"Geografia",
"Física",
"Química"
]

function carregarMaterias(){

let materias = JSON.parse(localStorage.getItem("materias"))

if(!materias){
materias = materiasPadrao
localStorage.setItem("materias", JSON.stringify(materias))
}

let lista = document.getElementById("listaMaterias")

lista.innerHTML=""

materias.forEach((m,index)=>{

let div = document.createElement("div")
div.className="materia"

let texto = document.createElement("span")
texto.innerText=m

// clicar na matéria abre o caderno
texto.onclick=function(){
abrirCaderno(m)
}

let btn = document.createElement("button")
btn.innerText="✖"
btn.className="apagar"

btn.onclick=function(e){
e.stopPropagation()
removerMateria(index)
}

div.appendChild(texto)
div.appendChild(btn)

lista.appendChild(div)

})

}

function addMateria(){

let input = document.getElementById("materiaInput")

if(input.value.trim()=="") return

let materias = JSON.parse(localStorage.getItem("materias")) || []

materias.push(input.value)

localStorage.setItem("materias",JSON.stringify(materias))

input.value=""

carregarMaterias()

}

function removerMateria(index){

let materias = JSON.parse(localStorage.getItem("materias")) || []

materias.splice(index,1)

localStorage.setItem("materias",JSON.stringify(materias))

carregarMaterias()

}

// 🔥 abrir caderno
function abrirCaderno(nome){

materiaAtual = nome

document.getElementById("caderno").style.display="block"
document.getElementById("tituloMateria").innerText="📘 " + nome

let anotacaoSalva = localStorage.getItem("anotacao_"+nome)

document.getElementById("anotacao").value = anotacaoSalva || ""

}

// 💾 salvar anotação
function salvarAnotacao(){

if(!materiaAtual) return

let texto = document.getElementById("anotacao").value

localStorage.setItem("anotacao_"+materiaAtual, texto)

alert("Anotação salva!")

}

carregarMaterias()

</script>

</body>
</html>
